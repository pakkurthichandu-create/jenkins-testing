<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Spring Boot Task Manager - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .task-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .task-item:hover {
            transform: translateX(8px);
            background: rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="bg-[#0f172a] text-gray-100 min-h-screen font-sans">
    <div class="container mx-auto px-4 py-12 max-w-2xl">
        
        <!-- Header Section -->
        <div class="flex items-center justify-between mb-10">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight flex items-center gap-3">
                    <span class="bg-gradient-to-r from-green-400 to-emerald-500 bg-clip-text text-transparent">
                        <i class="fas fa-bolt mr-1"></i> TaskMaster
                    </span>
                </h1>
                <p class="text-gray-400 mt-2 font-medium">Manage your daily goals with speed</p>
            </div>
            <div class="text-right">
                <span class="bg-green-500/10 text-green-400 px-3 py-1 rounded-full text-sm font-bold border border-green-500/20">
                     <i class="fas fa-check-double mr-1"></i> LIVE CI/CD
                </span>
            </div>
        </div>

        <!-- Main Card -->
        <div class="glass-card rounded-3xl shadow-2xl p-8 overflow-hidden">
            
            <!-- Input Form -->
            <form th:action="@{/addTask}" method="post" class="mb-10 flex gap-3">
                <input type="text" name="description" placeholder="Type a new task..." 
                       class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-green-500/50 focus:border-green-500 transition-all placeholder:text-gray-500">
                <button type="submit" 
                        class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white px-8 py-4 rounded-2xl font-bold shadow-lg shadow-green-500/20 transition duration-300 active:scale-95">
                    <i class="fas fa-plus"></i>
                </button>
            </form>

            <!-- Task List -->
            <div class="space-y-4">
                <div th:each="task : ${tasks}" 
                     class="task-item flex items-center justify-between p-5 bg-white/5 rounded-2xl border border-white/5">
                    <div class="flex items-center gap-4">
                        <a th:href="@{/toggleTask/{id}(id=${task.id})}" class="text-2xl transition transform active:scale-125">
                            <i th:if="${task.completed}" class="fas fa-check-circle text-green-400 shadow-green-400/20"></i>
                            <i th:unless="${task.completed}" class="far fa-circle text-gray-600 hover:text-green-400/50"></i>
                        </a>
                        <span th:text="${task.description}" 
                              th:class="${task.completed ? 'text-gray-500 line-through decoration-2 italic' : 'text-gray-200 font-semibold'}">
                        </span>
                    </div>
                    <a th:href="@{/deleteTask/{id}(id=${task.id})}" 
                       class="text-gray-600 hover:text-red-400 p-2 transition-colors">
                        <i class="fas fa-trash-alt"></i>
                    </a>
                </div>
                
                <!-- Empty State -->
                <div th:if="${#lists.isEmpty(tasks)}" class="text-center py-12">
                    <div class="inline-flex items-center justify-center w-20 h-20 bg-white/5 rounded-full mb-4">
                        <i class="fas fa-leaf text-3xl text-gray-700"></i>
                    </div>
                    <p class="text-gray-500 text-lg font-medium">Your list is clean and fresh.</p>
                </div>
            </div>
        </div>
        
        <!-- Footer Info -->
        <div class="mt-12 flex flex-col items-center gap-4">
            <div class="flex gap-6 text-2xl">
                <i class="fab fa-java text-orange-400/50"></i>
                <i class="fab fa-docker text-blue-400/50"></i>
                <i class="fas fa-dharmachakra text-blue-500/50"></i>
            </div>
            <p class="text-gray-600 text-sm font-medium uppercase tracking-widest">
                Automated by Jenkins & Argo CD
            </p>
        </div>
    </div>
</body>
</html>
