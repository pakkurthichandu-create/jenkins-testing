<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Spring Boot TaskManager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .task-item {
            transition: all 0.3s ease;
        }
        .task-item:hover {
            transform: scale(1.01);
            background: rgba(255, 255, 255, 0.06);
        }
        .progress-bar {
            transition: width 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-100 min-h-screen font-sans">
    <div class="container mx-auto px-4 py-12 max-w-2xl">
        
        <!-- Header Section -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-4xl font-black tracking-tighter flex items-center gap-3">
                    <span class="bg-gradient-to-r from-green-300 via-emerald-400 to-teal-500 bg-clip-text text-transparent">
                        <i class="fas fa-rocket mr-1"></i> TASKFLOW
                    </span>
                </h1>
                <p class="text-gray-500 mt-1 text-sm uppercase tracking-widest font-semibold">Production Ready Dashboard</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-500 font-bold mb-1 uppercase tracking-tighter">System Health</div>
                <span class="flex items-center gap-2 bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-lg text-xs font-black border border-emerald-500/20">
                     <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> ARGO CD ACTIVE
                </span>
            </div>
        </div>

        <!-- Progress Overview -->
        <div class="glass-card rounded-3xl p-6 mb-8">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <h2 class="text-lg font-bold text-gray-300">Project Progress</h2>
                    <p class="text-gray-500 text-sm" th:text="${completed + ' of ' + total + ' milestones reached'}"></p>
                </div>
                <div class="text-3xl font-black text-emerald-400" th:text="${progress + '%'}">0%</div>
            </div>
            <div class="w-full bg-white/5 rounded-full h-3 overflow-hidden">
                <div class="progress-bar bg-gradient-to-r from-green-500 to-emerald-400 h-full rounded-full shadow-[0_0_15px_rgba(52,211,153,0.3)]" 
                     th:style="'width: ' + ${progress} + '%'"></div>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="glass-card rounded-[2rem] shadow-2xl p-8">
            
            <!-- Input Terminal -->
            <form th:action="@{/addTask}" method="post" class="mb-10 flex gap-3">
                <div class="relative flex-1">
                    <i class="fas fa-terminal absolute left-4 top-1/2 -translate-y-1/2 text-gray-600"></i>
                    <input type="text" name="description" placeholder="New requirement..." autocomplete="off"
                           class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-5 py-4 focus:outline-none focus:ring-2 focus:ring-emerald-500/30 focus:border-emerald-500/50 transition-all text-gray-200">
                </div>
                <button type="submit" 
                        class="bg-emerald-500 hover:bg-emerald-400 text-gray-900 px-8 py-4 rounded-2xl font-black transition duration-300 transform active:scale-95 flex items-center gap-2">
                    DEPLOY <i class="fas fa-arrow-right text-xs"></i>
                </button>
            </form>

            <!-- Task Grid -->
            <div class="space-y-3">
                <div th:each="task : ${tasks}" 
                     class="task-item flex items-center justify-between p-5 bg-white/5 rounded-2xl border border-white/5 group">
                    <div class="flex items-center gap-5">
                        <a th:href="@{/toggleTask/{id}(id=${task.id})}" class="text-2xl transition transform active:scale-150">
                            <i th:if="${task.completed}" class="fas fa-check-square text-emerald-400"></i>
                            <i th:unless="${task.completed}" class="far fa-square text-gray-700 group-hover:text-emerald-500/50"></i>
                        </a>
                        <div>
                            <span th:text="${task.description}" 
                                  th:class="${task.completed ? 'text-gray-600 line-through' : 'text-gray-200 font-bold'}">
                            </span>
                            <div class="text-[10px] uppercase font-bold text-gray-600 mt-1 flex items-center gap-2">
                                <i class="far fa-clock"></i> <span th:text="'Added at ' + ${task.formattedDate}"></span>
                            </div>
                        </div>
                    </div>
                    <a th:href="@{/deleteTask/{id}(id=${task.id})}" 
                       class="opacity-0 group-hover:opacity-100 text-gray-700 hover:text-red-400 p-2 transition-all duration-300 translate-x-4 group-hover:translate-x-0">
                        <i class="fas fa-trash-alt"></i>
                    </a>
                </div>
                
                <!-- Zero State -->
                <div th:if="${#lists.isEmpty(tasks)}" class="text-center py-16">
                    <div class="w-16 h-16 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-emerald-500/20">
                        <i class="fas fa-ghost text-emerald-500/30 text-2xl"></i>
                    </div>
                    <p class="text-gray-600 font-bold text-sm uppercase tracking-widest">No Active Deployments</p>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="mt-12 pt-8 border-t border-white/5 flex flex-col items-center">
            <div class="flex gap-10 opacity-20 hover:opacity-100 transition-opacity duration-700">
                <i class="fab fa-java text-4xl"></i>
                <i class="fab fa-docker text-4xl"></i>
                <i class="fas fa-dharmachakra text-4xl"></i>
                <i class="fab fa-git-alt text-4xl"></i>
            </div>
            <p class="text-gray-700 text-[10px] font-black uppercase tracking-[0.3em] mt-8">
                Build: <span th:text="${total}"></span> Files Synchronized via Jenkins
            </p>
        </div>
    </div>
</body>
</html>
