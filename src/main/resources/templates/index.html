<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Spring Boot Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <div class="bg-white rounded-xl shadow-lg p-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-8 flex items-center">
                <i class="fas fa-tasks mr-3 text-blue-600"></i>
                Task Manager
            </h1>

            <form th:action="@{/addTask}" method="post" class="mb-8 flex gap-2">
                <input type="text" name="description" placeholder="What needs to be done?" 
                       class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                <button type="submit" 
                        class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-semibold transition duration-200 flex items-center">
                    <i class="fas fa-plus mr-2"></i> Add
                </button>
            </form>

            <div class="space-y-3">
                <div th:each="task : ${tasks}" 
                     class="flex items-center justify-between p-4 bg-gray-50 rounded-lg hover:bg-gray-100 transition duration-150">
                    <div class="flex items-center gap-3">
                        <a th:href="@{/toggleTask/{id}(id=${task.id})}" class="text-xl">
                            <i th:if="${task.completed}" class="far fa-check-circle text-green-500 hover:text-green-600"></i>
                            <i th:unless="${task.completed}" class="far fa-circle text-gray-400 hover:text-gray-500"></i>
                        </a>
                        <span th:text="${task.description}" 
                              th:class="${task.completed ? 'text-gray-400 line-through' : 'text-gray-700 font-medium'}">
                        </span>
                    </div>
                    <a th:href="@{/deleteTask/{id}(id=${task.id})}" 
                       class="text-red-400 hover:text-red-600 p-2 transition duration-150">
                        <i class="fas fa-trash-alt"></i>
                    </a>
                </div>
                
                <div th:if="${#lists.isEmpty(tasks)}" class="text-center py-8 text-gray-500">
                    <i class="fas fa-clipboard-list text-5xl mb-3 block opacity-20"></i>
                    No tasks yet. Start by adding one above!
                </div>
            </div>
        </div>
        
        <div class="mt-8 text-center text-gray-400 text-sm">
            <p>Built with <i class="fas fa-heart text-red-400"></i> using Spring Boot, Thymeleaf & Argo CD</p>
        </div>
    </div>
</body>
</html>
